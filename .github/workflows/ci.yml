name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  static:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - name: Parse scripts and config
        run: |
          $ErrorActionPreference = "Stop"
          foreach ($file in @("prepare-host.ps1", "create-workstation-vm.ps1", "check-workstation-vm.ps1", "bootstrap-windows.ps1", "vendor/Fido.ps1")) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count) { throw "PowerShell parse failed: $file" }
          }
          Get-ChildItem config -Filter *.json | ForEach-Object {
            Get-Content -Raw $_.FullName | ConvertFrom-Json | Out-Null
          }
          if ((Get-ChildItem config -Filter *.json).Count -ne 1) { throw "Expected one config file." }

  smoke:
    needs: static
    runs-on: windows-latest
    timeout-minutes: 240
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Restore image cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\workstation-image-cache
          key: workstation-vm-${{ runner.os }}-windows11-v1
          restore-keys: |
            workstation-vm-${{ runner.os }}-windows11-

      - name: Restore host tool cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\oscdimg-cache
          key: workstation-vm-${{ runner.os }}-oscdimg-v1

      - name: Use host tool cache
        run: |
          $ErrorActionPreference = "Stop"
          $cache = "$env:RUNNER_TEMP\oscdimg-cache"
          New-Item -ItemType Directory -Force -Path $cache | Out-Null
          $cache | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Prepare host
        run: .\prepare-host.ps1

      - name: Save host tool cache
        run: |
          $ErrorActionPreference = "Stop"
          $cache = "$env:RUNNER_TEMP\oscdimg-cache"
          $cached = Join-Path $cache "oscdimg.exe"
          $installed = Get-Command oscdimg.exe -ErrorAction SilentlyContinue
          if ((-not (Test-Path $cached)) -and $installed) {
            Copy-Item -LiteralPath $installed.FullName -Destination $cached -Force
          }

      - name: Prepare Hyper-V network
        run: |
          Import-Module Hyper-V
          if (-not (Get-VMSwitch -Name "workstation-ci" -ErrorAction SilentlyContinue)) {
            New-VMSwitch -Name "workstation-ci" -SwitchType Internal | Out-Null
          }

      - name: Prepare CI config
        run: |
          $cfg = Get-Content -Raw config/windows.json | ConvertFrom-Json
          $cfg.vmName = "ci-Windows11"
          $cfg.password = "Workstation123!"
          $cfg.switchName = "workstation-ci"
          $cfg.baseDir = "$env:RUNNER_TEMP/workstation-vm/windows11"
          $cfg.imageCacheDir = "$env:RUNNER_TEMP/workstation-image-cache/windows"
          $cfg.memoryGB = 4
          $cfg.cpuCount = 2
          $cfg.recreate = $true
          $cfg.createCheckpoint = $false
          $cfg.wingetPackages = @()
          $cfg | ConvertTo-Json -Depth 5 | Set-Content config/windows.json

      - name: Create VM
        run: .\create-workstation-vm.ps1 --config config/windows.json

      - name: Check VM
        run: .\check-workstation-vm.ps1 --config config/windows.json

      - name: Collect state
        if: always()
        run: |
          $cfg = Get-Content -Raw config/windows.json | ConvertFrom-Json
          Get-VM -Name $cfg.vmName -ErrorAction SilentlyContinue | Format-List * | Out-File "$env:RUNNER_TEMP\vm-state.txt"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vm-state
          path: ${{ runner.temp }}\vm-state.txt
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          $cfg = Get-Content -Raw config/windows.json | ConvertFrom-Json
          Stop-VM -Name $cfg.vmName -TurnOff -Force -ErrorAction SilentlyContinue
          Remove-VM -Name $cfg.vmName -Force -ErrorAction SilentlyContinue
