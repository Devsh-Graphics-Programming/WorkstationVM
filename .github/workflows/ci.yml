name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  static:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - name: Parse scripts and config
        run: |
          $ErrorActionPreference = "Stop"
          foreach ($file in @("create-workstation-vm.ps1", "check-workstation-vm.ps1", "bootstrap-windows.ps1")) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count) { throw "PowerShell parse failed: $file" }
          }
          Get-ChildItem config -Filter *.json | ForEach-Object {
            Get-Content -Raw $_.FullName | ConvertFrom-Json | Out-Null
          }

  smoke:
    needs: static
    runs-on: windows-latest
    timeout-minutes: 240
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Restore image cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\workstation-image-cache
          key: workstation-vm-${{ runner.os }}-windows11-v1
          restore-keys: |
            workstation-vm-${{ runner.os }}-windows11-

      - name: Install host tools
        run: |
          choco install windows-adk-oscdimg -y --no-progress
          $paths = @(
            "${env:ProgramFiles(x86)}\Windows Kits\10\Assessment and Deployment Kit\Deployment Tools\amd64\Oscdimg",
            "$env:ChocolateyInstall\bin"
          ) | Where-Object { Test-Path $_ }
          foreach ($path in $paths) {
            $env:Path = "$path;$env:Path"
            $path | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          }

      - name: Prepare Hyper-V network
        run: |
          Import-Module Hyper-V
          if (-not (Get-VMSwitch -Name "workstation-ci" -ErrorAction SilentlyContinue)) {
            New-VMSwitch -Name "workstation-ci" -SwitchType Internal | Out-Null
          }

      - name: Create VM
        run: .\create-workstation-vm.ps1 --config config/ci-windows11.json

      - name: Check VM
        run: .\check-workstation-vm.ps1 --config config/ci-windows11.json

      - name: Collect state
        if: always()
        run: |
          $cfg = Get-Content -Raw config/ci-windows11.json | ConvertFrom-Json
          Get-VM -Name $cfg.vmName -ErrorAction SilentlyContinue | Format-List * | Out-File "$env:RUNNER_TEMP\vm-state.txt"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vm-state
          path: ${{ runner.temp }}\vm-state.txt
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          $cfg = Get-Content -Raw config/ci-windows11.json | ConvertFrom-Json
          Stop-VM -Name $cfg.vmName -TurnOff -Force -ErrorAction SilentlyContinue
          Remove-VM -Name $cfg.vmName -Force -ErrorAction SilentlyContinue
